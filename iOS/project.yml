name: Coolchain-TempLog
options:
  bundleIdPrefix: com.shimondeitel.coolchain
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Coolchain-TempLog:
    type: application
    platform: iOS
    sources:
      - path: Coolchain-TempLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coolchain
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Coolchain-TempLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Coolchain-TempLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Coolchain-TempLogTests
      - path: Coolchain-TempLog.storekit
    dependencies:
      - target: Coolchain-TempLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coolchain.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Coolchain-TempLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Coolchain-TempLogUITests
    dependencies:
      - target: Coolchain-TempLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coolchain.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Coolchain-TempLog:
    build:
      targets:
        Coolchain-TempLog: all
        Coolchain-TempLogTests: [test]
        Coolchain-TempLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Coolchain-TempLog.storekit
    test:
      config: Debug
      storeKitConfiguration: Coolchain-TempLog.storekit
      targets:
        - Coolchain-TempLogTests
        - Coolchain-TempLogUITests
    archive:
      config: Release
